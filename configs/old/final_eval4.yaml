outdir: /projects/molonc/scratch/kbreen/hapclone-eval/cnasim/final_eval4

#cnasim
num_cells: 1000
coverage: 0.1
bin_length: 500000
uniform_coverage: True
eval_params: "-j 20 -c 5"
sample_id: 
   - set1
   - set2
   - set3
   - set4
   - set5

num_snps: 2000000
num_blocks: 50

#hapclone
power_scale: 
   - 2
   - 1

beta_value: 
   - 0.5
   - 1

baf_stay:
   - 99
   - 999
   - 0.9 
   - 0.09

num_threads: 8
max_copystate: 5
phase_switch: 0.01

#Run Chisel
#Number of bins per chunk to split chisel combine analysis into
chunk_size: 50
# Number of threads used by chisel calling
call_threads: 12
# Number of threads used by chisel combine
combo_threads: 4
# Number of EM restarts when running chisel combine
combo_restarts: 1
#Size of haplotype bins used by chisel
haplotype_bin_size: 50000
#Maximum ploidy for chisel to consider
max_ploidy: 6
#Minimum number of reads to retain a cell
min_cell_reads: 1000
